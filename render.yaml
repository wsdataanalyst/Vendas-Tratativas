services:
  - type: web
    name: vendas-tratativas
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: RENDER
        value: "true"
      - key: APP_SECRET_KEY
        generateValue: true
      - key: SUPABASE_MODE
        value: pooler
      - key: SUPABASE_PROJECT_REF
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
